<h2>Register</h2>

<form (ngSubmit)="register()">

  <!-- Two way binding -->
  <input type="text" [(ngModel)]="user.name" name="name" placeholder="Name" required><br><br>

  <input type="email" [(ngModel)]="user.email" name="email" placeholder="Email" required><br><br>

  <input type="password" [(ngModel)]="user.password" name="password" placeholder="Password" required><br><br>

  <button type="submit">Register</button>

</form>

<a routerLink="/login">Go to Login</a>
