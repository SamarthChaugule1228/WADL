<!DOCTYPE html>
<html>
<head>
    <title>jQuery Mobile Website</title>

    <!-- Viewport for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- CDN Links -->
    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery JS -->
    <script src="https://code.jquery.com/jquery-1.11.3.min.js"></script>

    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>

<body>

<!-- Page 1 -->
<div data-role="page" id="home">

    <!-- Header -->
    <div data-role="header" data-theme="b">
        <h1>My Mobile Site</h1>
    </div>

    <!-- Navbar -->
    <div data-role="navbar">
        <ul>
            <li><a href="#home" class="ui-btn-active">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>

    <!-- Content -->
    <div role="main" class="ui-content">
        <h3>Welcome</h3>
        <p>This is a simple jQuery Mobile website.</p>

        <button id="btn">Click Me</button>
    </div>

    <!-- Footer -->
    <div data-role="footer">
        <h4>Footer Section</h4>
    </div>

</div>

<!-- Page 2 -->
<div data-role="page" id="about">

    <div data-role="header" data-theme="b">
        <h1>About</h1>
    </div>

    <div role="main" class="ui-content">
        <p>This website is created using jQuery Mobile.</p>
        <a href="#home" class="ui-btn">Go Back</a>
    </div>

</div>

<!-- Page 3 -->
<div data-role="page" id="contact">

    <div data-role="header" data-theme="b">
        <h1>Contact</h1>
    </div>

    <div role="main" class="ui-content">

        <form>
            <label>Name:</label>
            <input type="text">

            <label>Email:</label>
            <input type="text">

            <label>
                <input type="checkbox"> Subscribe
            </label>

            <input type="submit" value="Submit">
        </form>

        <a href="#home" class="ui-btn">Go Back</a>
    </div>

</div>

<script>
    $("#btn").click(function(){
        alert("Button Clicked!");
    });
</script>

</body>
</html>
